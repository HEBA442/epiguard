name: epiguard
description: A new Flutter project for seizure detection and caregiver monitoring.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # Networking & API
  http: ^1.2.1
  
  # Local Storage
  flutter_secure_storage: ^9.2.2

  # Bluetooth & Connectivity
  flutter_blue_plus: ^1.31.20
  permission_handler: ^11.3.1

  # Alert System
  audioplayers: ^6.0.0
  geolocator: ^13.0.2
  flutter_foreground_task: ^8.16.0

  # Firebase Push Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # mDNS Server Discovery
  multicast_dns: ^0.3.2+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
